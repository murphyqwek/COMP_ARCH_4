  (print d)
  (print-pstr "\n")

  (setq e (+ 50 -10 -7 2))
  (print-pstr "neg lit = ")
  (print e)
  (print-pstr "\n")

  (setq f (+ a b))
  (print-pstr "bin vars (+ a b) = ")
  (print f)
  (print-pstr "\n")

  (setq mix (+ a (+ 7 8 9)))
  (print-pstr "mixed = ")
  (print mix)
  (print-pstr "\n")
